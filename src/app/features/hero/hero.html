<section id="hero" class="section hero">
  <div class="container hero-container">
    <div class="hero-pixel-art" aria-hidden="true">
      <svg viewBox="0 0 32 20" width="128" height="80" class="pixel-terminal-svg">
        <rect x="0.5" y="0.5" width="31" height="14" rx="1.5" fill="none" stroke="#00d4aa" stroke-width="1" />
        <circle cx="4" cy="4" r="1" fill="#ff5f56" />
        <circle cx="8" cy="4" r="1" fill="#ffbd2e" />
        <circle cx="12" cy="4" r="1" fill="#27c93f" />
        <rect x="4" y="8" width="10" height="1.5" rx="0.5" fill="#00d4aa" opacity="0.9" />
        <rect x="4" y="11" width="16" height="1" rx="0.5" fill="#4a4a6a" opacity="0.6" />
        <rect x="10" y="15" width="12" height="1.5" rx="0.5" fill="#00d4aa" opacity="0.4" />
        <rect x="8" y="16.5" width="16" height="1.5" rx="0.5" fill="#00d4aa" opacity="0.3" />
        <rect x="8" y="18" width="16" height="1.5" rx="0.5" fill="#00d4aa" opacity="0.2" />
      </svg>
    </div>

    <p class="hero-prompt">
      <span class="prompt-user">guest</span><span class="prompt-at">@</span><span class="prompt-host">portfolio</span><span class="prompt-colon">:</span><span class="prompt-path">~</span><span class="prompt-dollar">$</span> <span class="prompt-cmd">whoami</span>
    </p>
    <h1 class="hero-name">{{ name }}</h1>
    <p class="hero-role">&gt; {{ role }}<span class="cursor-blinking">▋</span></p>
    <p class="hero-tagline">{{ ls.t('hero.tagline') }}</p>

    <div class="hero-actions">
      <a href="#projects" class="btn primary">{{ ls.t('hero.viewProjects') }}</a>
      <a href="#contact" class="btn secondary">{{ ls.t('hero.contact') }}</a>
    </div>

    <div class="hero-scroll-hint">
      <span class="scroll-arrow">▼</span>
      <span class="scroll-text">{{ ls.t('hero.scrollDown') }}</span>
    </div>
  </div>
</section>
